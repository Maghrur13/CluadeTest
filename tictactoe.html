<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 3px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 16px rgba(233, 69, 96, 0.6);
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-top: 1.5rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 0.6rem 1.2rem;
      border-radius: 10px;
    }

    .score-box span {
      display: block;
      font-size: 1.6rem;
      font-weight: bold;
    }

    .score-box.x-score span { color: #e94560; }
    .score-box.o-score span { color: #a8dadc; }
    .score-box.tie-score span { color: #f4a261; }

    #reset {
      margin-top: 1.5rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #reset:hover { background: #c73652; }

    #mode-toggle {
      margin-top: 0.8rem;
      padding: 0.5rem 1.5rem;
      font-size: 0.9rem;
      background: #0f3460;
      color: #a8dadc;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #mode-toggle:hover { background: #16213e; }
  </style>
</head>
<body>

<h1>TIC TAC TOE</h1>
<div id="status">X's turn</div>

<div id="board">
  <div class="cell" data-i="0"></div>
  <div class="cell" data-i="1"></div>
  <div class="cell" data-i="2"></div>
  <div class="cell" data-i="3"></div>
  <div class="cell" data-i="4"></div>
  <div class="cell" data-i="5"></div>
  <div class="cell" data-i="6"></div>
  <div class="cell" data-i="7"></div>
  <div class="cell" data-i="8"></div>
</div>

<div id="score">
  <div class="score-box x-score">X <span id="xScore">0</span></div>
  <div class="score-box tie-score">Ties <span id="tieScore">0</span></div>
  <div class="score-box o-score">O <span id="oScore">0</span></div>
</div>

<button id="reset">New Game</button>
<button id="mode-toggle">vs Computer: OFF</button>

<script>
  const cells = document.querySelectorAll('.cell');
  const status = document.getElementById('status');
  const resetBtn = document.getElementById('reset');
  const modeBtn = document.getElementById('mode-toggle');
  const xScoreEl = document.getElementById('xScore');
  const oScoreEl = document.getElementById('oScore');
  const tieScoreEl = document.getElementById('tieScore');

  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  let board, current, gameOver, vsComputer, scores;

  function init() {
    board = Array(9).fill('');
    current = 'X';
    gameOver = false;
    cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
    status.textContent = "X's turn";
    scores = scores || { X: 0, O: 0, T: 0 };
    vsComputer = vsComputer || false;
  }

  function checkWinner() {
    for (const [a, b, c] of WINS) {
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return { winner: board[a], line: [a, b, c] };
      }
    }
    if (board.every(v => v)) return { winner: 'T' };
    return null;
  }

  function updateScore(result) {
    if (result.winner === 'X') { scores.X++; xScoreEl.textContent = scores.X; }
    else if (result.winner === 'O') { scores.O++; oScoreEl.textContent = scores.O; }
    else { scores.T++; tieScoreEl.textContent = scores.T; }
  }

  function handleResult(result) {
    gameOver = true;
    updateScore(result);
    if (result.winner === 'T') {
      status.textContent = "It's a tie!";
    } else {
      result.line.forEach(i => cells[i].classList.add('win'));
      status.textContent = `${result.winner} wins!`;
    }
  }

  function minimax(b, isMax) {
    const r = checkWinnerBoard(b);
    if (r) return r === 'O' ? 1 : r === 'X' ? -1 : 0;
    const moves = b.map((v, i) => v ? null : i).filter(i => i !== null);
    if (isMax) {
      let best = -Infinity;
      for (const i of moves) {
        b[i] = 'O'; best = Math.max(best, minimax(b, false)); b[i] = '';
      }
      return best;
    } else {
      let best = Infinity;
      for (const i of moves) {
        b[i] = 'X'; best = Math.min(best, minimax(b, true)); b[i] = '';
      }
      return best;
    }
  }

  function checkWinnerBoard(b) {
    for (const [a, bv, c] of WINS) {
      if (b[a] && b[a] === b[bv] && b[a] === b[c]) return b[a];
    }
    if (b.every(v => v)) return 'T';
    return null;
  }

  function computerMove() {
    const moves = board.map((v, i) => v ? null : i).filter(i => i !== null);
    let best = -Infinity, chosen = moves[0];
    for (const i of moves) {
      board[i] = 'O';
      const score = minimax(board, false);
      board[i] = '';
      if (score > best) { best = score; chosen = i; }
    }
    makeMove(chosen);
  }

  function makeMove(i) {
    if (board[i] || gameOver) return;
    board[i] = current;
    cells[i].textContent = current;
    cells[i].classList.add(current.toLowerCase(), 'taken');

    const result = checkWinner();
    if (result) { handleResult(result); return; }

    current = current === 'X' ? 'O' : 'X';
    status.textContent = `${current}'s turn`;

    if (vsComputer && current === 'O' && !gameOver) {
      setTimeout(computerMove, 300);
    }
  }

  cells.forEach(cell => {
    cell.addEventListener('click', () => {
      if (vsComputer && current === 'O') return;
      makeMove(+cell.dataset.i);
    });
  });

  resetBtn.addEventListener('click', init);

  modeBtn.addEventListener('click', () => {
    vsComputer = !vsComputer;
    modeBtn.textContent = `vs Computer: ${vsComputer ? 'ON' : 'OFF'}`;
    init();
  });

  scores = { X: 0, O: 0, T: 0 };
  init();
</script>
</body>
</html>
